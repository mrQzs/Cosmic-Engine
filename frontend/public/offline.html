<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — CyberGeek</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', monospace;
    }
    h1 {
      font-size: 1.5rem;
      color: #06b6d4;
      text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
      letter-spacing: 0.2em;
    }
    p { color: #94a3b8; font-size: 0.875rem; margin-top: 1rem; }
    button {
      margin-top: 2rem;
      padding: 0.5rem 1.5rem;
      border: 1px solid rgba(6, 182, 212, 0.3);
      background: transparent;
      color: #06b6d4;
      font-family: inherit;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover { border-color: rgba(6, 182, 212, 0.6); }
  </style>
</head>
<body>
  <h1>SIGNAL INTERRUPTED</h1>
  <p>You are currently offline. Previously visited articles may still be available.</p>
  <button onclick="location.reload()">[ RETRY CONNECTION ]</button>
</body>
</html>
